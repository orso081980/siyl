# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: "%env(APP_SECRET)%"
    # Trust the immediately-connecting proxy (API Gateway / load balancer)
    # so that X-Forwarded-Proto is honoured and isSecure() returns true in Lambda.
    trusted_proxies: "REMOTE_ADDR"
    trusted_headers:
        [
            "x-forwarded-for",
            "x-forwarded-host",
            "x-forwarded-port",
            "x-forwarded-proto",
            "x-forwarded-prefix",
        ]

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
