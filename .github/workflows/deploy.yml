name: Deploy to AWS Lambda

on:
    push:
        branches:
            - main # change to "master" if that is your default branch

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest

        steps:
            # ── 1. Checkout ────────────────────────────────────────────────────────
            - name: Checkout repository
              uses: actions/checkout@v4

            # ── 2. PHP + Composer ─────────────────────────────────────────────────
            - name: Set up PHP 8.4
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  tools: composer:v2
                  coverage: none

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: composer-${{ hashFiles('composer.lock') }}
                  restore-keys: composer-

            - name: Install Composer dependencies (no dev)
              # --no-scripts skips the post-install-cmd (cache:clear / assets:install)
              # which would fail because there is no .env file in CI.
              # We handle cache warming ourselves in the next steps.
              run: composer install --no-dev --optimize-autoloader --no-interaction --no-scripts

            # ── 3. Symfony optimisations ──────────────────────────────────────────
            # Create a minimal .env so dump-env prod can read it.
            # Real secrets come from AWS SSM at Lambda runtime — these are placeholders.
            - name: Create minimal .env for dump-env
              run: |
                  cat > .env <<'EOF'
                  APP_ENV=prod
                  APP_DEBUG=0
                  APP_SECRET=placeholder
                  DATABASE_URL=placeholder
                  JWT_SECRET_KEY=/var/task/config/jwt/private.pem
                  JWT_PUBLIC_KEY=/var/task/config/jwt/public.pem
                  JWT_PASSPHRASE=placeholder
                  CORS_ALLOW_ORIGIN=placeholder
                  DEFAULT_URI=placeholder
                  REDIS_URL=redis://localhost:6379
                  EOF
                  # Remove leading whitespace added by YAML indentation
                  sed -i 's/^[[:space:]]*//' .env

            - name: Dump env for production
              run: composer dump-env prod

            - name: Warm cache for production
              run: APP_ENV=prod php bin/console cache:warmup

            # ── 4. JWT keys ───────────────────────────────────────────────────────
            # Store the raw PEM file contents as GitHub Secrets:
            #   JWT_PRIVATE_KEY = paste the full contents of config/jwt/private.pem
            #   JWT_PUBLIC_KEY  = paste the full contents of config/jwt/public.pem
            # Using env: prevents shell injection and preserves multiline values.
            - name: Restore JWT keys
              env:
                  JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
                  JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
              run: |
                  mkdir -p config/jwt
                  printf '%s\n' "$JWT_PRIVATE_KEY" > config/jwt/private.pem
                  printf '%s\n' "$JWT_PUBLIC_KEY"  > config/jwt/public.pem
                  # Verify the files were written correctly
                  if [ ! -s config/jwt/private.pem ]; then
                    echo "ERROR: JWT_PRIVATE_KEY secret is not set or empty" >&2
                    exit 1
                  fi
                  if [ ! -s config/jwt/public.pem ]; then
                    echo "ERROR: JWT_PUBLIC_KEY secret is not set or empty" >&2
                    exit 1
                  fi

            # ── 5. Node + Serverless Framework ────────────────────────────────────
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install Serverless Framework
              run: npm install -g serverless@3

            # ── 6. Deploy ─────────────────────────────────────────────────────────
            - name: Deploy to AWS Lambda
              run: serverless deploy --verbose
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  AWS_DEFAULT_REGION: eu-west-1

            # ── 7. Run DB migrations on Lambda ────────────────────────────────────
            - name: Run database migrations
              run: serverless invoke -f console --data '{"cli":"doctrine:migrations:migrate --no-interaction"}' --log
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  AWS_DEFAULT_REGION: eu-west-1
